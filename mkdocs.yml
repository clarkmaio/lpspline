site_name: LPSpline
site_url: https://lpspline.readthedocs.io
repo_url: https://github.com/clarkmaio/lpspline
repo_name: clarkmaio/lpspline

theme:
  name: material
  palette:
    - scheme: default
      primary: white
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: true
  - mkdocs-jupyter:
      include_source: True
      ignore_h1_titles: True

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Notebooks:
    - Quick Start: notebooks/quick_start.ipynb
  - Reference:
    - User Guide: user_guide.md
    - API Reference: api.md
